name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # Build native installer on each platform
  # ──────────────────────────────────────────────
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libasound2-dev libfontconfig1-dev \
            freeglut3-dev libx11-xcb-dev libxkbcommon-x11-dev \
            cmake libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Ensure valid PNG icon (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 -c "
          from PIL import Image
          img = Image.open('logo.png').convert('RGBA').resize((512,512))
          img.save('logo.png','PNG')
          "

      - name: Build release binary
        run: cargo build --release

      - name: Package application
        run: cargo packager --release

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p dist
          for ext in deb AppImage msi exe dmg; do
            find target/release -maxdepth 1 -name "*.$ext" -exec cp {} dist/ \;
          done
          ls dist/

      - name: Upload platform packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.label }}
          path: dist/
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Collect all packages, create zip + source, publish release
  # ──────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: packages-linux
          path: all-packages/

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: packages-windows
          path: all-packages/

      - name: Download macOS packages
        uses: actions/download-artifact@v4
        with:
          name: packages-macos
          path: all-packages/

      - name: Create combined zip
        run: |
          cd all-packages
          zip -r ../neu-${{ github.ref_name }}-all-packages.zip .
          cd ..

      - name: Create source archive
        run: |
          git archive --format=tar.gz \
            --prefix=neu-${{ github.ref_name }}-src/ \
            HEAD \
            -o neu-${{ github.ref_name }}-source.tar.gz

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            all-packages/*
            neu-${{ github.ref_name }}-all-packages.zip
            neu-${{ github.ref_name }}-source.tar.gz
