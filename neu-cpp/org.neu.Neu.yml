app-id: org.neu.Neu
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: neu-cpp

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-music:ro
  - --device=dri

modules:
  - name: neu-music
    buildsystem: cmake
    sources:
      - type: dir
        path: .
